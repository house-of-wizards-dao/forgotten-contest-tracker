services:
  forgotten-contest-tracker:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - forgotten-contest-tracker-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  forgotten-contest-tracker-data:
